<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>Cuaderno Pro Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav id="toolbar-container">
        <div id="toolbar">
            <button id="btn-select" class="active" title="Mover/Selección Múltiple">👆</button>
            <button id="btn-front" title="Traer al Frente (Ctrl + ↑)">⏫</button>
            <button id="btn-back" title="Enviar al Fondo (Ctrl + ↓)">⏬</button>
            
            <button id="btn-pan" title="Mover Lienzo">🖐️</button>
            <button id="btn-zoom_reset" title="Restaurar Zoom/Vista">👁️</button>
            <div class="sep"></div>
            <button id="btn-pen" title="Lápiz">✏️</button>
            <button id="btn-laser" title="Puntero Láser">🔦</button> 
            <button id="btn-line" title="Línea">📏</button>
            <button id="btn-rect" title="Cuadrado">⬜</button>
            <button id="btn-ellipse" title="Círculo">⭕</button>
            <button id="btn-text" title="Texto">📝</button>
            <button id="btn-image" title="Imagen">🖼️</button>
            <button id="btn-erase" title="Goma">🧽</button>
            <div class="sep"></div>
            <button id="btn-undo" title="Deshacer (Ctrl+Z)">↩️</button>
            <button id="btn-redo" title="Rehacer (Ctrl+Y)">↪️</button>
            <div class="sep"></div>
            <input type="color" id="color-picker" value="#000000">
            <div class="slider-box">
                <input type="range" id="width-slider" min="1" max="25" value="3">
            </div>
            <div class="sep"></div>
            <button id="btn-export" title="Exportar JPG">📸</button>
            <button id="btn-save" title="Guardar">💾</button>
            <button id="btn-load" title="Cargar">📂</button>
            <button id="btn-clear" style="color:red" title="Borrar Todo">🗑️</button>
        </div>
    </nav>

    <input type="file" id="image-upload-input" accept="image/*" style="display: none;">
    <canvas id="pizarra"></canvas>
    <div id="cursores"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
