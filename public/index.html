<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuaderno Digital Pro Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toolbar">
        <button id="btn-select" class="active">👆</button>
        <button id="btn-pen">✏️</button>
        <button id="btn-rect">⬜</button>
        <button id="btn-ellipse">⭕</button>
        <button id="btn-text">📝</button>
        <button id="btn-image">🖼️</button>
        <button id="btn-erase">🧽</button>
        <input type="color" id="color-picker" value="#000000">
        <input type="range" id="width-slider" min="1" max="20" value="3">
        <button id="btn-export">📸 Exportar</button>
    </div>
    <canvas id="pizarra"></canvas>
    <div id="cursores"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
