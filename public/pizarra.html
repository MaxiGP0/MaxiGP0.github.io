<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>Pizarra | Cuaderno Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

    <style>
        #pantalla-espera { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f7f6; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #pantalla-espera h2 { color: #333; margin-bottom: 10px; }
        #pantalla-espera p { color: #666; font-size: 18px; }
        #btn-cancelar { margin-top: 20px; padding: 10px 20px; background: #e0e0e0; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* --- NOTIFICACIONES ESTILO PREMIUM --- */
        #contenedor-notificaciones { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 10px; }
        .toast { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px);
            padding: 16px; border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.12); 
            border-left: 4px solid #2196F3; 
            animation: slideIn 0.3s ease-out; 
            display: flex; flex-direction: column; gap: 12px;
            font-family: -apple-system, sans-serif;
        }
        .toast span { font-size: 14px; color: #333; display: flex; align-items: center; }
        .toast-btns { display: flex; gap: 8px; }
        .btn-aceptar { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; font-weight: 600; padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-aceptar:hover { background: #a5d6a7; }
        .btn-rechazar { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; font-weight: 600; padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; flex: 1; }
        .btn-rechazar:hover { background: #ef9a9a; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }

        /* --- FIX DEL BUG DEL RECTÁNGULO BLANCO Y AJUSTE DE TAMAÑOS --- */
        #toolbar-container {
            position: fixed; 
            bottom: 20px; 
            top: auto !important; /* FIX: Evita que el CSS heredado estire la barra */
            height: auto !important; /* FIX: Fija la altura al contenido */
            left: 50%; transform: translateX(-50%);
            background: white; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.15);
            padding: 4px 8px; z-index: 1000; 
            max-width: 95vw; overflow-x: auto; white-space: nowrap; /* Activa el scroll si es muy ancha */
        }
        #toolbar-container::-webkit-scrollbar { display: none; } 
        #toolbar { display: flex; align-items: center; gap: 2px; }
        #toolbar button { 
            display: flex; align-items: center; justify-content: center; 
            background: transparent; border: none; padding: 6px; 
            border-radius: 8px; cursor: pointer; color: #555; transition: 0.2s; flex-shrink: 0;
        }
        #toolbar button:hover { background: #f0f0f0; }
        #toolbar button.active { background: #e3f2fd; color: #2196F3; }
        .sep { width: 1px; height: 20px; background: #ddd; margin: 0 4px; flex-shrink: 0; }
        .material-symbols-outlined { font-size: 20px; } /* Iconos un poco más pequeños */

        #minimap-container {
            position: fixed; bottom: 85px; right: 20px; width: 200px; height: 150px;
            background: rgba(255, 255, 255, 0.95); border: 1px solid #eee; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; overflow: hidden;
            display: none; cursor: crosshair; backdrop-filter: blur(5px);
        }
        #minimap { width: 100%; height: 100%; }
        #minimap-label { position: absolute; top: 5px; left: 5px; font-size: 10px; color: #555; font-weight: bold; background: rgba(255,255,255,0.8); padding: 3px 6px; border-radius: 4px;}

        #text-editor-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.6); z-index: 999999;
            display: flex; justify-content: center; align-items: center; 
            backdrop-filter: blur(4px);
        }
        .editor-modal {
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); width: 90%; max-width: 350px;
            display: flex; flex-direction: column; gap: 12px;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .editor-modal textarea {
            width: 100%; height: 100px; border: 2px solid #eee; border-radius: 8px;
            padding: 10px; font-size: 15px; font-family: -apple-system, sans-serif;
            resize: none; outline: none; box-sizing: border-box; transition: 0.2s;
        }
        .editor-modal textarea:focus { border-color: #2196F3; }
        .editor-modal button {
            background: #2196F3; color: white; border: none; padding: 10px;
            border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .editor-modal button:hover { background: #1976D2; }
    </style>
</head>
<body>
    
    <div id="pantalla-espera">
        <div style="margin-bottom: 20px;"><span class="material-symbols-outlined" style="font-size: 60px; color: #2196F3;">meeting_room</span></div>
        <h2 id="texto-espera">Conectando a la sala...</h2>
        <p>Código: <b id="codigo-sala-ui"></b></p>
        <button id="btn-cancelar" onclick="window.location.href='index.html'">Volver al Inicio</button>
    </div>

    <div id="contenedor-notificaciones"></div>

    <div id="follow-banner" class="hidden">
        <span><span class="material-symbols-outlined" style="font-size: 16px; vertical-align: middle;">visibility</span> Siguiendo a <b id="follow-name"></b></span>
        <button id="btn-unfollow">Detener</button>
    </div>

    <div id="user-list-container">
        <h3><span class="material-symbols-outlined" style="font-size: 18px; vertical-align: middle;">group</span> En línea</h3>
        <p id="codigo-compartir" style="font-size: 12px; color: #888; text-align: center; margin-bottom: 10px;">Código: <b id="sala-id-display"></b></p>
        <div id="user-list"></div>
    </div>

    <nav id="toolbar-container">
        <div id="toolbar">
            <button id="btn-home" title="Volver al Inicio" onclick="window.location.href='index.html'"><span class="material-symbols-outlined">home</span></button>
            <div class="sep"></div>
            
            <button id="btn-select" class="active" title="Seleccionar"><span class="material-symbols-outlined">arrow_selector_tool</span></button>
            <button id="btn-undo" title="Deshacer (Ctrl+Z)"><span class="material-symbols-outlined">undo</span></button>
            <button id="btn-redo" title="Rehacer (Ctrl+Y)"><span class="material-symbols-outlined">redo</span></button>
            <div class="sep"></div>

            <button id="btn-pan" title="Mover Lienzo"><span class="material-symbols-outlined">pan_tool</span></button>
            <button id="btn-minimap" title="Ver Minimapa"><span class="material-symbols-outlined">map</span></button>
            <div class="sep"></div>
            
            <button id="btn-pen" title="Lápiz"><span class="material-symbols-outlined">draw</span></button>
            <button id="btn-laser" title="Láser"><span class="material-symbols-outlined">flare</span></button> 
            <button id="btn-sticky" title="Nota Adhesiva"><span class="material-symbols-outlined">sticky_note_2</span></button>
            <button id="btn-line" title="Línea"><span class="material-symbols-outlined">horizontal_rule</span></button>
            <button id="btn-rect" title="Cuadrado"><span class="material-symbols-outlined">rectangle</span></button>
            <button id="btn-ellipse" title="Círculo"><span class="material-symbols-outlined">circle</span></button>
            <button id="btn-text" title="Texto"><span class="material-symbols-outlined">text_fields</span></button>
            <button id="btn-image" title="Subir Imagen"><span class="material-symbols-outlined">image</span></button>
            <button id="btn-pdf" title="Importar PDF"><span class="material-symbols-outlined">picture_as_pdf</span></button>
            <button id="btn-erase" title="Goma"><span class="material-symbols-outlined">ink_eraser</span></button>
            <div class="sep"></div>

            <button id="btn-front" title="Traer al Frente"><span class="material-symbols-outlined">flip_to_front</span></button>
            <button id="btn-back" title="Enviar al Fondo"><span class="material-symbols-outlined">flip_to_back</span></button>
            <button id="btn-crop" title="Recortar Imagen/PDF"><span class="material-symbols-outlined">crop</span></button>
            <div class="sep"></div>
            
            <input type="color" id="color-picker" value="#000000" title="Color" style="padding:0; border:none; border-radius:50%; width:22px; height:22px; cursor: pointer;"> 
            <div class="slider-box" style="width: 50px; display:flex; align-items:center; margin-left:4px;"><input type="range" id="width-slider" min="1" max="25" value="3" style="width: 100%;"></div>
            <div class="sep"></div>
            
            <button id="btn-export" title="Exportar JPG"><span class="material-symbols-outlined">photo_camera</span></button>
            <button id="btn-clear" style="color:#e53935" title="Borrar Todo"><span class="material-symbols-outlined">delete_forever</span></button>
        </div>
    </nav>

    <div id="minimap-container">
        <div id="minimap-label">MINIMAPA</div>
        <canvas id="minimap"></canvas>
    </div>

    <canvas id="pizarra"></canvas>
    <div id="cursores"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
